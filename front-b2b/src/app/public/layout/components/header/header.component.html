<header class="bg-surface-elevated shadow-md">
  <!-- Desktop -->
  <div class="hidden md:flex h-20 items-center">
    <div class="mx-10 w-full flex justify-between items-center">
      <a
        href="/"
        class="flex items-center gap-2 no-underline text-[2rem] font-normal text-text-primary"
        aria-label="VHan Delivery"
      >
        <img
          src="assets/images/logo-trans.png"
          alt="VHan Delivery"
          class="h-32 w-auto"
        />
      </a>
      <div class="flex items-center gap-8 flex-1 justify-between">
        <nav class="flex-1">
          <ul class="flex justify-center gap-8 list-none m-0 p-0">
            <li *ngFor="let item of navItems()">
              <a
                class="text-[1rem] font-medium text-text-secondary transition-colors duration-200 ease-out hover:text-primary"
                [class.text-primary]="item.active"
                [class.font-bold]="item.active"
                [routerLink]="isRouterLink(item.link) ? item.link : null"
                [attr.href]="!isRouterLink(item.link) ? item.link : null"
                [attr.target]="item.link?.startsWith('http') ? '_blank' : null"
                [attr.rel]="
                  item.link?.startsWith('http') ? 'noopener noreferrer' : null
                "
                (click)="handleNavigation($event, item.link)"
              >
                {{ item.labelKey | translate }}
              </a>
            </li>
          </ul>
        </nav>
        <div class="relative text-left flex shrink-0">
          <button
            type="button"
            class="flex items-center gap-2 bg-transparent rounded-full px-3 hover:border-primary transition-colors focus:outline-none"
            [attr.aria-expanded]="isLanguageDropdownOpen()"
            aria-haspopup="listbox"
            (click)="toggleLanguageDropdown()"
          >
            <img
              [src]="currentLanguageOption?.flag"
              [alt]="currentLanguageOption?.label"
              class="w-5 h-3.5 object-cover rounded-[2px] shadow-sm"
            />
            <span
              class="text-[0.875rem] font-medium text-text-primary min-w-[70px] text-left"
            >
              {{ currentLanguageOption?.label }}
            </span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-text-secondary transition-transform duration-200"
              [class.rotate-180]="isLanguageDropdownOpen()"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>

          <div
            *ngIf="isLanguageDropdownOpen()"
            class="absolute top-full right-0 mt-2 w-48 bg-white dark:bg-surface-elevated border border-border-base rounded-lg shadow-xl py-1 z-50 overflow-hidden ring-1 ring-black ring-opacity-5 focus:outline-none"
            role="listbox"
          >
            <button
              *ngFor="let lang of languageOptions"
              type="button"
              class="w-full flex items-center justify-between px-4 py-2.5 hover:bg-surface-neutral/10 transition-colors group"
              [attr.aria-selected]="currentLanguage() === lang.value"
              role="option"
              (click)="selectLanguage(lang.value)"
            >
              <div class="flex items-center gap-3">
                <img
                  [src]="lang.flag"
                  [alt]="lang.label"
                  class="w-5 h-3.5 object-cover rounded-[2px] shadow-sm"
                />
                <span
                  class="text-[0.875rem] font-medium"
                  [class.text-primary]="currentLanguage() === lang.value"
                  [class.text-text-primary]="currentLanguage() !== lang.value"
                >
                  {{ lang.label }}
                </span>
              </div>
              <svg
                *ngIf="currentLanguage() === lang.value"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                class="text-primary"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </div>

          <ng-container *ngIf="auth.currentUser() as user; else guestUser">
            <div class="relative group p-2">
              <button
                type="button"
                class="p-2 text-text-primary hover:text-primary transition-colors"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="7" r="4" />
                  <path d="M5.5 21a6.5 6.5 0 0 1 13 0" />
                </svg>
              </button>

              <div
                class="absolute top-full right-0 mt-2 w-56 bg-white dark:bg-surface-elevated border border-border-base rounded-lg shadow-xl py-2 z-50 overflow-hidden ring-1 ring-black ring-opacity-5 focus:outline-none invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200"
              >
                <div class="px-4 py-3 border-b border-border-base mb-1">
                  <p class="text-sm font-medium text-text-primary truncate">
                    {{ user.username || 'User' }}
                  </p>
                  <p class="text-xs text-text-secondary truncate">
                    {{ user.email }}
                  </p>
                </div>
                <button
                  (click)="logout()"
                  class="w-full flex items-center hover:text-[var(--color-status-error)] gap-2 px-4 py-2.5 text-sm text-text-primary hover:bg-surface-neutral/10 transition-colors"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="text-primary"
                  >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                  <span>{{ 'auth.common.logout' | translate }}</span>
                </button>
              </div>
            </div>
          </ng-container>

          <ng-template #guestUser>
            <button
              type="button"
              class="px-4 py-2 text-[0.875rem] font-medium text-text-primary hover:text-primary transition-colors"
              routerLink="/auth/login"
            >
              {{ 'header.nav.login' | translate }}
            </button>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile -->
  <div class="md:hidden flex flex-col gap-3 px-4 py-3">
    <div class="flex items-center justify-between gap-3">
      <a
        href="/"
        class="flex items-center gap-2 no-underline text-[20px] font-semibold text-text-primary"
        aria-label="VHan Delivery"
      >
        <span>VHan</span>
        <span class="text-text-primary">{{
          'header.brandSuffix' | translate
        }}</span>
      </a>
      <div class="flex items-center gap-3">
        <div class="relative text-left">
          <button
            type="button"
            class="flex items-center gap-1.5 bg-transparent rounded-full px-2.5 py-1 hover:border-primary transition-colors focus:outline-none"
            [attr.aria-expanded]="isLanguageDropdownOpen()"
            aria-haspopup="listbox"
            (click)="toggleLanguageDropdown()"
          >
            <img
              [src]="currentLanguageOption?.flag"
              [alt]="currentLanguageOption?.label"
              class="w-5 h-3.5 object-cover rounded-[2px] shadow-sm"
            />
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-text-secondary transition-transform duration-200"
              [class.rotate-180]="isLanguageDropdownOpen()"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>

          <div
            *ngIf="isLanguageDropdownOpen()"
            class="absolute top-full right-0 mt-2 w-44 bg-white dark:bg-surface-elevated border border-border-base rounded-lg shadow-xl py-1 z-50 overflow-hidden ring-1 ring-black ring-opacity-5 focus:outline-none"
            role="listbox"
          >
            <button
              *ngFor="let lang of languageOptions"
              type="button"
              class="w-full flex items-center justify-between px-4 py-2.5 hover:bg-surface-neutral/10 transition-colors group"
              [attr.aria-selected]="currentLanguage() === lang.value"
              role="option"
              (click)="selectLanguage(lang.value)"
            >
              <div class="flex items-center gap-3">
                <img
                  [src]="lang.flag"
                  [alt]="lang.label"
                  class="w-5 h-3.5 object-cover rounded-[2px] shadow-sm"
                />
                <span
                  class="text-[0.875rem] font-medium"
                  [class.text-primary]="currentLanguage() === lang.value"
                  [class.text-text-primary]="currentLanguage() !== lang.value"
                >
                  {{ lang.label }}
                </span>
              </div>
              <svg
                *ngIf="currentLanguage() === lang.value"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                class="text-primary"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </div>
        </div>
        <ng-container *ngIf="auth.currentUser() as user; else guestMobile">
          <div class="flex items-center gap-1 whitespace-nowrap">
            <span class="text-sm font-medium text-text-primary">{{
              user.username || user.email
            }}</span>
            <button
              type="button"
              class="p-2 text-text-primary"
              (click)="logout()"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </button>
          </div>
        </ng-container>

        <ng-template #guestMobile>
          <button
            type="button"
            class="px-2 py-1 text-sm font-medium text-text-primary hover:text-primary transition-colors"
            routerLink="/auth/login"
          >
            {{ 'header.nav.login' | translate }}
          </button>
        </ng-template>
      </div>
    </div>

    <nav class="-mx-4 px-4">
      <ul
        class="header-scroll flex gap-5 list-none m-0 p-0 overflow-x-auto whitespace-nowrap text-[15px] font-medium text-text-secondary"
      >
        <li *ngFor="let item of navItems()">
          <a
            class="transition-colors duration-200 ease-out hover:text-primary"
            [class.text-primary]="item.active"
            [class.font-bold]="item.active"
            [routerLink]="isRouterLink(item.link) ? item.link : null"
            [attr.href]="!isRouterLink(item.link) ? item.link : null"
            [attr.target]="item.link?.startsWith('http') ? '_blank' : null"
            [attr.rel]="
              item.link?.startsWith('http') ? 'noopener noreferrer' : null
            "
            (click)="handleNavigation($event, item.link)"
          >
            {{ item.labelKey | translate }}
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
