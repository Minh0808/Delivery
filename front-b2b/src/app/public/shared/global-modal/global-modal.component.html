<div
  class="fixed inset-0 z-[100] flex items-center justify-center overflow-y-auto overflow-x-hidden p-4 sm:p-6"
  *ngIf="isOpen"
  @backdropAnimation
>
  <!-- Backdrop -->
  <div
    class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity"
    (click)="onClose()"
  ></div>

  <!-- Modal Panel -->
  <div
    class="relative w-full max-w-lg transform rounded-2xl bg-white p-6 text-left shadow-2xl transition-all sm:my-8"
    @modalAnimation
  >
    <!-- Close Button -->
    <button
      (click)="onClose()"
      class="absolute right-4 top-4 rounded-full p-1 text-text-light hover:bg-bg-gray hover:text-text-gray focus:outline-none transition-colors"
    >
      <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path
          fill-rule="evenodd"
          d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
          clip-rule="evenodd"
        />
      </svg>
    </button>

    <div class="sm:flex sm:items-start">
      <!-- Icon -->
      <div
        class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full sm:mx-0 sm:h-10 sm:w-10"
        [ngClass]="iconClass"
      >
        <!-- Success Icon -->
        <svg
          *ngIf="type === 'success'"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.5 12.75l6 6 9-13.5"
          />
        </svg>
        <!-- Error Icon -->
        <svg
          *ngIf="type === 'error'"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
          />
        </svg>
        <!-- Warning Icon -->
        <svg
          *ngIf="type === 'warning'"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
          />
        </svg>
        <!-- Info Icon -->
        <svg
          *ngIf="type === 'info'"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"
          />
        </svg>
      </div>

      <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
        <h3 class="text-lg font-semibold leading-6 text-text-dark">
          {{ title | translate }}
        </h3>
        <div class="mt-2">
          <p class="text-sm text-text-gray">
            {{ message | translate }}
          </p>
        </div>
      </div>
    </div>

    <div class="mt-8 sm:flex sm:flex-row-reverse gap-3">
      <button
        type="button"
        class="inline-flex w-full justify-center rounded-lg px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 sm:w-auto transition-all"
        (click)="onConfirm()"
        [ngClass]="{
          'bg-status-success focus:ring-status-success': type === 'success',
          'bg-status-error focus:ring-status-error': type === 'error',
          'bg-primary-yellow focus:ring-primary-yellow': type === 'warning',
          'bg-blue-600 hover:bg-blue-500 focus:ring-blue-500': type === 'info'
        }"
      >
        {{ 'MODAL.CONFIRM' | translate }}
      </button>
      <button
        type="button"
        class="mt-3 inline-flex w-full justify-center rounded-lg bg-bg-white px-4 py-2.5 text-sm font-semibold text-text-dark shadow-sm ring-1 ring-inset ring-border hover:bg-bg-gray sm:mt-0 sm:w-auto transition-all"
        (click)="onClose()"
      >
        {{ 'MODAL.CLOSE' | translate }}
      </button>
    </div>
  </div>
</div>
