<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 animate-fade-in"
  *ngIf="isOpen"
>
  <div
    class="bg-surface-base rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-hidden p-8 relative animate-slide-up"
  >
    <!-- Close Button -->
    <button
      (click)="onClose()"
      class="absolute top-4 right-4 text-text-tertiary hover:text-text-primary transition-colors"
    >
      <svg
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>

    <!-- Icon -->
    <div class="flex justify-center mb-6">
      <div
        class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8 text-primary"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
      </div>
    </div>

    <!-- Title & Description -->
    <div class="text-center mb-8">
      <h3 class="text-2xl font-bold text-text-primary mb-2">
        {{ 'modal.otpTitle' | translate }}
      </h3>
      <p class="text-text-secondary text-sm">
        {{ 'modal.otpDesc' | translate }}
        <br />
        <span class="font-semibold text-primary">{{ maskedPhone }}</span>
      </p>
    </div>

    <!-- OTP Inputs -->
    <div class="mb-8 px-2">
      <input
        #otpInput
        type="text"
        [(ngModel)]="otpCode"
        (input)="onInput($event)"
        class="w-full text-center text-3xl tracking-[1em] py-3 border-b-2 border-border-base focus:border-primary focus:outline-none transition-colors font-bold text-text-primary"
        placeholder="••••••"
        maxlength="6"
        inputmode="numeric"
      />
    </div>

    <!-- Actions -->
    <div class="flex flex-col space-y-4">
      <button
        (click)="onVerify()"
        [disabled]="otpCode.length < 6 || isVerifying"
        class="w-full py-3.5 bg-primary text-content-on-primary rounded-lg font-semibold hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-2"
      >
        <svg
          *ngIf="isVerifying"
          class="animate-spin h-5 w-5"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        {{
          isVerifying
            ? ('modal.verifying' | translate)
            : ('modal.confirm' | translate)
        }}
      </button>

      <div class="text-center">
        <p class="text-sm text-text-secondary mb-1">
          {{ 'modal.otpNotReceived' | translate }}
        </p>
        <button
          (click)="onResend()"
          [disabled]="countdown > 0"
          class="text-sm font-semibold text-primary hover:text-primary-hover disabled:text-text-tertiary transition-colors"
        >
          <span *ngIf="countdown > 0">
            {{ 'modal.otpResendIn' | translate }} {{ countdown }}s
          </span>
          <span *ngIf="countdown === 0">
            {{ 'modal.otpResend' | translate }}
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
