@if (isOpen()) {
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
  (click)="onBackdropClick()"
>
  <div
    class="bg-surface-base rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 space-y-6"
    (click)="onModalClick($event)"
  >
    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="flex justify-center">
        @if (oauthData()?.avatarUrl) {
        <img
          [src]="oauthData()!.avatarUrl"
          alt="Avatar"
          class="w-16 h-16 rounded-full border-2 border-primary"
        />
        } @else {
        <div
          class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center"
        >
          <svg
            class="w-8 h-8 text-primary"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
        </div>
        }
      </div>
      <h3 class="text-lg font-bold text-text-primary">
        {{ linkAccountTitle() }}
      </h3>
      <p class="text-sm text-text-secondary">
        {{ linkDescription() }}
      </p>
    </div>

    <!-- Account Info -->
    <div
      class="bg-surface-elevated rounded-lg p-4 space-y-2 border border-border-base"
    >
      <div class="flex items-center gap-3">
        <svg
          class="w-5 h-5 text-text-tertiary"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
          />
        </svg>
        <span class="text-sm text-text-primary">{{ oauthData()?.email }}</span>
      </div>
      @if (oauthData()?.displayName) {
      <div class="flex items-center gap-3">
        <svg
          class="w-5 h-5 text-text-tertiary"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
        <span class="text-sm text-text-primary">{{
          oauthData()?.displayName
        }}</span>
      </div>
      }
    </div>

    <!-- Password Form -->
    <form [formGroup]="linkingForm" (ngSubmit)="onSubmit()">
      <div class="space-y-2">
        <label class="text-sm font-medium text-text-primary">{{
          'auth.oauth.confirmPassword' | translate
        }}</label>
        <div class="relative">
          <input
            [type]="passwordVisible() ? 'text' : 'password'"
            formControlName="password"
            class="w-full h-[2.875rem] rounded-[0.5rem] border border-border-base focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20 outline-none text-base text-text-primary placeholder:text-text-tertiary px-4 bg-surface-base transition-colors"
            [attr.placeholder]="'auth.oauth.passwordPlaceholder' | translate"
            [attr.aria-label]="'auth.oauth.confirmPassword' | translate"
          />
          <button
            type="button"
            class="absolute inset-y-0 right-3 flex items-center text-text-secondary hover:text-text-primary focus:outline-none"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="
              passwordVisible()
                ? ('auth.login.hidePassword' | translate)
                : ('auth.login.showPassword' | translate)
            "
          >
            @if (!passwordVisible()) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6S2.5 12 2.5 12Z"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
            } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M4.22 4.22 19.78 19.78"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M9.88 9.88A3 3 0 0 1 12 9c2 0 3 2 3 2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M7.05 7.05C4.5 8.5 3 12 3 12s3.5 6 9 6c2.02 0 3.73-.57 5.1-1.43"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            }
          </button>
        </div>
        @if (error()) {
        <p class="text-sm text-status-error">{{ error() }}</p>
        }
      </div>

      <!-- Actions -->
      <div class="flex gap-3 mt-6">
        <button
          type="button"
          (click)="onClose()"
          class="flex-1 h-[2.875rem] rounded-[0.5rem] border border-border-base text-text-primary font-medium hover:bg-surface-elevated transition-colors"
        >
          <span>
            {{ 'common.button.cancel' | translate }}
          </span>
        </button>
        <button
          type="submit"
          [disabled]="isSubmitDisabled"
          class="flex-1 h-[2.875rem] rounded-[0.5rem] bg-primary text-content-on-primary font-semibold hover:bg-primary-hover transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if (isLoading()) {
          <svg
            class="animate-spin h-5 w-5"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          }
          <span>{{ linkButtonText() }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
}
