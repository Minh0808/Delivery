<div
  class="min-h-screen bg-surface-base flex items-center justify-center px-4 py-10"
>
  <div
    class="w-full max-w-[78.75rem] grid lg:grid-cols-[1fr_480px] gap-24 items-center"
  >
    <!-- Left panel -->
    <div
      class="hidden lg:flex relative rounded-[1.75rem] overflow-hidden shadow-[0_30px_80px_rgba(0,0,0,0.08)] bg-surface-base"
    >
      <img
        src="assets/images/auth/login-hero.png"
        alt="Delivery Illustration"
        class="w-full h-full object-cover"
      />
      <div
        class="absolute inset-0 bg-gradient-to-t from-[rgba(0,0,0,0.45)] to-transparent"
        aria-hidden="true"
      ></div>
      <div class="absolute bottom-8 left-8 right-8 text-left">
        <h1
          class="text-[3rem] lg:text-[3.5rem] font-bold leading-tight text-content-on-primary"
        >
          {{ 'menu.vhanDelivery' | translate }}
        </h1>
        <p class="mt-3 text-[1.125rem] text-content-on-primary">
          {{ 'auth.login.hero.subtitle' | translate }}
        </p>
      </div>
    </div>

    <!-- Right panel -->
    <div class="w-full max-w-[32.5rem] mx-auto space-y-8">
      <!-- Header -->
      <div class="space-y-2">
        <h1 class="font-bold text-text-primary leading-tight">
          {{ 'header.nav.login' | translate }}
        </h1>
        <h2 class="font-bold text-primary">
          {{ 'menu.vhanDelivery' | translate }}
        </h2>
        <p class="text-[1rem] text-text-secondary">
          {{ 'auth.login.subtitle' | translate }}
        </p>
      </div>

      <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
        <!-- Email -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-text-primary">{{
            'auth.field.email' | translate
          }}</label>
          <div class="relative">
            <input
              type="email"
              formControlName="email"
              class="w-full h-[2.875rem] rounded-[0.5rem] border border-border-base focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20 outline-none text-base text-text-primary placeholder:text-text-tertiary px-4 bg-surface-base transition-colors"
              [attr.placeholder]="'auth.login.emailPlaceholder' | translate"
            />
            <div
              *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
              class="absolute -bottom-6 left-0 text-sm text-status-error"
            >
              {{ 'auth.error.emailInvalid' | translate }}
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-text-primary">{{
            'auth.field.password' | translate
          }}</label>
          <div class="relative">
            <input
              [type]="passwordVisible() ? 'text' : 'password'"
              formControlName="password"
              class="w-full h-[2.875rem] rounded-[0.5rem] border border-border-base focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20 outline-none text-base text-text-primary placeholder:text-text-tertiary px-4 bg-surface-base transition-colors"
              [attr.placeholder]="'auth.login.passwordPlaceholder' | translate"
            />
            <button
              type="button"
              class="absolute inset-y-0 right-3 flex items-center text-text-secondary hover:text-text-primary focus:outline-none"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="
                passwordVisible()
                  ? ('auth.login.hidePassword' | translate)
                  : ('auth.login.showPassword' | translate)
              "
              [attr.aria-pressed]="passwordVisible()"
            >
              <svg
                *ngIf="!passwordVisible()"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6S2.5 12 2.5 12Z"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg
                *ngIf="passwordVisible()"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M4.22 4.22 19.78 19.78"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9.88 9.88A3 3 0 0 1 12 9c2 0 3 2 3 2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M7.05 7.05C4.5 8.5 3 12 3 12s3.5 6 9 6c2.02 0 3.73-.57 5.1-1.43"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div
              *ngIf="
                form.get('password')?.invalid && form.get('password')?.touched
              "
              class="absolute -bottom-6 left-0 text-sm text-status-error"
            >
              {{ 'auth.error.passwordMin' | translate }}
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="space-y-3 pt-2">
          <button
            type="submit"
            class="w-full h-[3rem] rounded-[0.5rem] bg-primary text-content-on-primary font-semibold flex items-center justify-center gap-2 px-5 shadow-[0_8px_24px_rgba(243,91,42,0.35)] hover:bg-primary-hover transition-all disabled:opacity-60 disabled:cursor-not-allowed"
          >
            <img
              src="assets/images/auth/btn-arrow.svg"
              alt="Arrow"
              class="h-[14px]"
            />
            <span>{{ 'auth.login.submit' | translate }}</span>
          </button>

          <button
            type="button"
            (click)="loginWithGoogle()"
            class="w-full h-[3rem] rounded-[0.5rem] border border-border-base text-text-primary text-[0.9375rem] font-semibold flex items-center justify-center gap-3 px-5 bg-surface-base hover:text-primary hover:border-primary transition-colors"
          >
            <svg
              class="w-5 h-5"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            <span>{{ 'auth.login.google' | translate }}</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Google Account Linking Modal -->
<app-google-link-modal
  [isOpen]="showLinkingModal()"
  [googleData]="googleLinkingData()"
  [isLoading]="linkingLoading()"
  [error]="linkingError()"
  (closeModal)="closeLinkingModal()"
  (submitForm)="submitLinking($event.password)"
/>
