<div class="flex flex-col gap-4 md:gap-6 px-4 md:px-0">
  <!-- Tab Navigation - Pill style on mobile-->
  <nav
    class="flex gap-2 md:gap-6 overflow-x-auto scrollbar-hide -mx-4 px-4 md:mx-0 md:px-0"
  >
    @for (tab of visibleTabs(); track tab.link) {
    <a
      [routerLink]="tab.link"
      routerLinkActive="active-tab"
      #rla="routerLinkActive"
      class="shrink-0 md:shrink pb-2 md:pb-3 text-sm md:text-base font-normal transition-all duration-200 bg-background px-4 py-2 md:p-0 rounded-lg md:rounded-none border md:border-0"
      [class.border-primary]="rla.isActive"
      [class.bg-transparent]="rla.isActive"
      [class.text-primary]="rla.isActive"
      [class.md:border-b-[3px]]="rla.isActive"
      [class.md:border-primary]="rla.isActive"
      [class.border-border]="!rla.isActive"
      [class.text-content-secondary]="!rla.isActive"
      [class.hover:text-primary]="!rla.isActive"
    >
      {{ tab.labelKey | translate }}
    </a>
    }
  </nav>

  <!-- Child Route Content -->
  <router-outlet />
</div>
